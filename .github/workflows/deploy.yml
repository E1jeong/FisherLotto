name: FisherLotto Play Store Auto Deploy

on:
  workflow_dispatch: # 📌 우리가 확정한 '수동 실행(버튼 클릭)' 방식으로 변경했습니다!

jobs:
  deploy:
    runs-on: ubuntu-latest # GitHub의 우분투 서버를 하나 빌려서 작업합니다.

    steps:
      - name: 1. 어부로또 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. 자바(JDK) 17 세팅하기
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # 안드로이드 프로젝트 버전에 맞게 수정 가능 (보통 11 또는 17)

      - name: 2-5. 구글 서비스 JSON 파일 복구하기
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > app/google-services.json

      - name: 3. 앱 빌드하기 (App Bundle 생성)
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: 4. 앱 서명하기 (금고에서 키 꺼내서 도장 찍기)
        uses: ilharp/sign-android-release@v2
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.KEYSTORE_FILE }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: 5. 구글 플레이 스토어에 업로드하기! 🚀
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.queentech.fisherlotto # ★여기를 어부로또 실제 패키지명으로 꼭! 바꿔주세요★
          releaseFiles: ${{steps.sign_app.outputs.signedReleaseFile}}
          track: internal # 처음엔 안전하게 '내부 테스트(internal)' 트랙으로 올립니다.